<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အတာသင်္ကြန် အွန်လိုင်းရေလောင်းပွဲ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: linear-gradient(to bottom, #00c6ff, #0072ff); min-height: 100vh; }
        .water-drop { position: absolute; pointer-events: none; animation: fall 1s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) scale(0); opacity: 0; } }
    </style>
</head>
<body class="text-white flex flex-col items-center p-4">

    <!-- Header -->
    <header class="text-center my-6">
        <h1 class="text-4xl font-bold">💦 အတာသင်္ကြန် 💦</h1>
        <p class="mt-2 text-blue-100">အွန်လိုင်းကနေ ရေလောင်းကြမယ်</p>
    </header>

    <!-- Main Container -->
    <div id="app" class="bg-white/20 backdrop-blur-md p-6 rounded-3xl shadow-2xl w-full max-w-md text-center">
        
        <!-- Step 1: Create Profile -->
        <div id="setup-view">
            <h2 class="text-xl mb-4">နာမည်လေးအရင်ပေးပါ</h2>
            <input type="text" id="nickname" placeholder="Nickname..." class="w-full p-3 rounded-xl text-black outline-none mb-4">
            
            <p class="mb-2">Avatar ရွေးပါ</p>
            <div class="flex justify-around mb-6">
                <div class="avatar-opt border-4 border-transparent p-1 rounded-full cursor-pointer" onclick="selectAvatar('🧒', this)">
                    <span class="text-4xl">🧒</span>
                </div>
                <div class="avatar-opt border-4 border-transparent p-1 rounded-full cursor-pointer" onclick="selectAvatar('👧', this)">
                    <span class="text-4xl">👧</span>
                </div>
                <div class="avatar-opt border-4 border-transparent p-1 rounded-full cursor-pointer" onclick="selectAvatar('🐥', this)">
                    <span class="text-4xl">🐥</span>
                </div>
            </div>
            
            <button onclick="createProfile()" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold py-3 px-8 rounded-full shadow-lg transition">
                Link ထုတ်မယ် 🚀
            </button>
        </div>

        <!-- Step 2: Share Profile -->
        <div id="share-view" class="hidden">
            <div id="user-display" class="mb-4">
                <span id="my-avatar" class="text-6xl"></span>
                <h2 id="my-name" class="text-2xl font-bold mt-2"></h2>
                <div class="text-yellow-300 text-lg mt-1">ရေလောင်းခံရမှု: <span id="my-count" class="font-bold text-2xl">0</span> ကြိမ်</div>
            </div>
            
            <div id="qrcode" class="flex justify-center p-4 bg-white rounded-xl mb-4"></div>
            
            <button onclick="copyLink()" class="w-full bg-blue-600 py-3 rounded-xl mb-2 font-bold">🔗 Link ကူးမယ်</button>
            <p class="text-xs text-blue-200">Link ကို Messenger ကနေတစ်ဆင့် သူငယ်ချင်းတွေကို ပို့ပြီး ရေလောင်းခိုင်းလိုက်ပါ!</p>
        </div>

        <!-- Step 3: Water Landing (Someone else's link) -->
        <div id="splash-view" class="hidden">
            <span id="target-avatar" class="text-8xl"></span>
            <h2 id="target-name" class="text-3xl font-bold mt-4"></h2>
            <p class="text-blue-100 mb-6">ကို ရေလောင်းပေးလိုက်ပါ!</p>
            
            <button onclick="pourWater()" class="bg-blue-500 hover:bg-cyan-400 p-8 rounded-full shadow-inner animate-bounce text-4xl">
                🌊
            </button>
            <div class="mt-4 text-xl">လောင်းပြီးသူ: <span id="target-count" class="font-bold">0</span> ယောက်</div>
        </div>
    </div>

    <!-- Contact & Services Section -->
    <footer class="mt-10 text-center text-sm text-blue-100 space-y-2">
        <p>Developed by <a href="https://m.me/1HiGd2hafR" class="underline font-bold text-yellow-300">Daily Wage App</a></p>
        <div class="flex flex-wrap justify-center gap-4">
            <a href="https://wedsite-apk-services.netlify.app/">Services</a>
            <a href="https://apk-downloads.netlify.app/">APKs</a>
            <a href="tel:0618201594">📞 0618201594</a>
        </div>
    </footer>

    <script>
        // Firebase Configuration (Using your provided config)
        const firebaseConfig = {
            apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
            authDomain: "seafood-oder.firebaseapp.com",
            databaseURL: "https://seafood-oder-default-rtdb.firebaseio.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:dbc6f03c58da328b65c421"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let selectedAvatarIcon = '🧒';
        let currentUserId = localStorage.getItem('thingyan_user_id');

        // Check if URL has an ID (Someone visiting a link)
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');

        window.onload = () => {
            if (targetId) {
                showView('splash-view');
                loadTargetProfile(targetId);
            } else if (currentUserId) {
                showView('share-view');
                loadMyProfile(currentUserId);
            }
        };

        function selectAvatar(icon, el) {
            selectedAvatarIcon = icon;
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.style.borderColor = 'transparent');
            el.style.borderColor = '#fbbf24';
        }

        function showView(viewId) {
            ['setup-view', 'share-view', 'splash-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        function createProfile() {
            const name = document.getElementById('nickname').value;
            if (!name) return alert("နာမည်လေး အရင်ရိုက်ပါဗျာ!");
            
            const newId = 'user_' + Math.random().toString(36).substr(2, 9);
            const userData = {
                name: name,
                avatar: selectedAvatarIcon,
                count: 0
            };

            db.ref('users/' + newId).set(userData).then(() => {
                localStorage.setItem('thingyan_user_id', newId);
                currentUserId = newId;
                location.reload();
            });
        }

        function loadMyProfile(id) {
            db.ref('users/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('my-name').innerText = data.name;
                    document.getElementById('my-avatar').innerText = data.avatar;
                    document.getElementById('my-count').innerText = data.count;
                    
                    const link = window.location.origin + window.location.pathname + '?id=' + id;
                    document.getElementById('qrcode').innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: link, width: 150, height: 150 });
                }
            });
        }

        function loadTargetProfile(id) {
            db.ref('users/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('target-name').innerText = data.name;
                    document.getElementById('target-avatar').innerText = data.avatar;
                    document.getElementById('target-count').innerText = data.count;
                }
            });
        }

        function pourWater() {
            if (!targetId) return;
            db.ref('users/' + targetId + '/count').transaction((current) => (current || 0) + 1);
            
            // Splash Animation
            for(let i=0; i<15; i++) {
                const drop = document.createElement('div');
                drop.innerHTML = '💧';
                drop.className = 'water-drop text-2xl';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.top = '-20px';
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 2000);
            }
        }

        function copyLink() {
            const link = window.location.origin + window.location.pathname + '?id=' + currentUserId;
            navigator.clipboard.writeText(link).then(() => alert("Link ကို Copy ကူးလိုက်ပါပြီ!"));
        }
    </script>
</body>
</html>
